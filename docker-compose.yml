# Desarrollo local — alineado a `pdr/PDR-05` y HU-001.
# Uso: `docker compose up -d` (API + Postgres + Redis + Vite web).

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: gyh
      POSTGRES_PASSWORD: gyh_dev
      POSTGRES_DB: gyh
    ports:
      - "5432:5432"
    volumes:
      - gyh_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gyh -d gyh"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Dentro de la red Docker, Postgres no está en localhost.
      DATABASE_URL: postgresql+asyncpg://gyh:gyh_dev@postgres:5432/gyh
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - gyh_web_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      PROXY_API: http://api:8000
    depends_on:
      - api

volumes:
  gyh_pgdata:
  gyh_web_node_modules:
