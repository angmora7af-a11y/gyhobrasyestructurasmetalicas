# CI para ramas hus/*: valida spec-kit y genera documentación de implementación
# (commits vs main) en agents/outputs/hus-implementations/, luego push con [skip ci].

name: CI — HUs (hus/*)

on:
  push:
    branches:
      - 'hus/**'
  pull_request:
    branches:
      - main

concurrency:
  group: hus-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Spec-kit validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar artefactos (hus, PDR, spec-kit)
        run: bash spec-kit/validate.sh

  document-and-push:
    name: Notas de implementación y push
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/hus/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar Markdown de implementación
        run: |
          chmod +x scripts/ci/hus-generate-implementation-notes.sh
          bash scripts/ci/hus-generate-implementation-notes.sh

      - name: Commit y push (solo si hay cambios)
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agents/outputs/hus-implementations/
          if git diff --staged --quiet; then
            echo "Sin cambios en notas de implementación."
            exit 0
          fi
          git commit -m "docs(hus): notas de implementación para ${BRANCH_NAME} [skip ci]"
          git push origin "HEAD:${BRANCH_NAME}"
