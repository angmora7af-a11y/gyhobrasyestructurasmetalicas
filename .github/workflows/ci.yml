# CI principal — lint/tests API, build/lint web, validación spec-kit (HU-001).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  spec-kit:
    name: Spec-kit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validar artefactos
        run: bash spec-kit/validate.sh

  api:
    name: API — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Tests
        run: pytest -q

  web:
    name: Web — lint, build, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test
